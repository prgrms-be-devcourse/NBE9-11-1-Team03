<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #ddd;
        }

        .card {
            margin: auto;
            max-width: 950px;
            width: 90%;
            box-shadow: 0 6px 20px 0 rgba(0, 0, 0, 0.19);
            border-radius: 1rem;
            border: transparent;
        }

        .summary {
            background-color: #ddd;
            border-top-right-radius: 1rem;
            border-bottom-right-radius: 1rem;
            padding: 4vh;
            color: rgb(65, 65, 65);
        }

        @media (max-width: 767px) {
            .summary {
                border-top-right-radius: unset;
                border-bottom-left-radius: 1rem;
            }
        }

        .row {
            margin: 0;
        }

        .products {
            width: 100%;
        }

        .order-row {
            font-size: 0.9rem;
            border-bottom: 1px solid #eee;
            padding: 10px 0;
        }
    </style>
    <title>자바칩 관리자 페이지</title>
</head>
<body class="container-fluid">
<div class="row justify-content-center m-4">
    <h1 class="text-center">Grids & Circle 관리자 센터</h1>
</div>
<div class="card">
    <div class="row">
        <div class="col-md-8 mt-4 d-flex flex-column align-items-start p-3 pt-0">
            <div class="d-flex justify-content-between w-100 align-items-center mb-3">
                <h5><b>전체 주문 목록</b></h5>
                <div class="d-flex gap-2">
                    <input type="email" id="searchEmail" class="form-control form-control-sm" placeholder="이메일 검색">
                    <button class="btn btn-sm btn-outline-dark" onclick="loadAllOrders()">전체 조회</button>
                    <button class="btn btn-sm btn-dark" onclick="loadOrders()">검색</button>
                </div>
            </div>
            <ul class="list-group products" id="orderList">
                <li class="list-group-item text-center">데이터를 불러오는 중...</li>
            </ul>
        </div>

        <div class="col-md-4 summary p-4">
            <div>
                <h2 id="formTitle">수동 주문 생성</h2>
            </div>
            <hr>
            <form id="orderForm">
                <div class="mb-3">
                    <label for="email" class="form-label">고객 이메일</label>
                    <input type="email" class="form-control mb-1" id="email" placeholder="example@email.com">
                </div>
                <div class="mb-3">
                    <label for="address" class="form-label">배송 주소</label>
                    <input type="text" class="form-control mb-1" id="address" placeholder="상세 주소를 입력하세요">
                </div>
                <div class="mb-3">
                    <label for="postcode" class="form-label">우편번호</label>
                    <input type="text" class="form-control" id="postcode" value="12345">
                </div>
                <div class="mb-3">
                    <label for="quantity" class="form-label">주문 수량 (기본 상품)</label>
                    <input type="number" class="form-control" id="quantity" value="1">
                </div>
            </form>

            <button class="btn btn-dark col-12" id="submitBtn" onclick="submitOrder()">주문 생성하기</button>
            <button class="btn btn-outline-secondary col-12 mt-2" id="cancelBtn" style="display: none;"
                    onclick="cancelEdit()">수정 취소
            </button>
        </div>
    </div>
</div>

<script>
    let editModeOrderId = null;
    const API_BASE_URL = '/api/v1/orders'; // API 주소 공통화

    window.onload = function () {
        loadAllOrders();
    };

    function loadAllOrders() {
        document.getElementById('searchEmail').value = '';
        fetchOrders(API_BASE_URL);
    }

    function loadOrders() {
        const email = document.getElementById('searchEmail').value;
        if (!email) {
            alert("검색할 이메일을 입력해주세요!");
            return;
        }
        fetchOrders(`${API_BASE_URL}?email=${email}`);
    }

    function fetchOrders(url) {
        const orderList = document.getElementById('orderList');

        fetch(url)
            .then(res => res.json())
            .then(data => {
                orderList.innerHTML = '';
                if (!data || data.length === 0) {
                    orderList.innerHTML = '<li class="list-group-item text-center">주문 내역이 없습니다.</li>';
                    return;
                }

                data.forEach(order => {
                    // DTO 구조에 맞춰 order.items[0].prodQuantity 등을 참조 (현재 DTO는 items 리스트임)
                    const qty = (order.items && order.items.length > 0) ? order.items[0].prodQuantity : 0;

                    const item = `
                    <li class="list-group-item d-flex justify-content-between align-items-center order-row">
                        <div class="col-1"><b>#${order.orderId}</b></div>
                        <div class="col-3">${order.email}</div>
                        <div class="col-4 text-muted">${order.detailAddress} <span class="badge bg-light text-dark border">${qty}개</span></div>
                        <div class="col-4 text-end">
                            <button class="btn btn-sm btn-outline-primary" onclick="fillEditForm(${order.orderId}, '${order.email}', '${order.detailAddress}', ${qty})">수정</button>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteOrder(${order.orderId})">삭제</button>
                        </div>
                    </li>`;
                    orderList.insertAdjacentHTML('beforeend', item);
                });
            })
            .catch(err => console.error("Error loading orders:", err));
    }

    function submitOrder() {
        if (editModeOrderId) executeUpdate(editModeOrderId);
        else createOrder();
    }

    function createOrder() {
        const payload = {
            email: document.getElementById('email').value,
            postalCode: document.getElementById('postcode').value,
            detailAddress: document.getElementById('address').value,
            items: [{productId: 1, prodQuantity: parseInt(document.getElementById('quantity').value)}]
        };

        fetch(API_BASE_URL, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        })
            .then(res => {
                if (res.ok) {
                    alert("✅ 주문이 생성되었습니다.");
                    document.getElementById('orderForm').reset();
                    loadAllOrders();
                } else {
                    alert("❌ 생성 실패!");
                }
            });
    }

    function fillEditForm(orderId, email, address, quantity) {
        editModeOrderId = orderId;
        document.getElementById('email').value = email;
        document.getElementById('address').value = address;
        document.getElementById('quantity').value = quantity;
        document.getElementById('formTitle').innerText = "수동 주문 수정";

        const btn = document.getElementById('submitBtn');
        btn.innerText = "주문 수정하기 (저장)";
        btn.classList.replace('btn-dark', 'btn-primary');
        document.getElementById('cancelBtn').style.display = 'block';
        window.scrollTo(0, 0);
    }

    function cancelEdit() {
        editModeOrderId = null;
        document.getElementById('orderForm').reset();
        document.getElementById('formTitle').innerText = "수동 주문 생성";

        const btn = document.getElementById('submitBtn');
        btn.innerText = "주문 생성하기";
        btn.classList.replace('btn-primary', 'btn-dark');
        document.getElementById('cancelBtn').style.display = 'none';
    }

    function executeUpdate(orderId) {
        const payload = {
            email: document.getElementById('email').value,
            detailAddress: document.getElementById('address').value,
            quantity: parseInt(document.getElementById('quantity').value)
        };

        // 백엔드 컨트롤러가 @PatchMapping이므로 PATCH로 전송
        fetch(`${API_BASE_URL}/${orderId}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        })
            .then(res => {
                if (res.ok) {
                    alert("✅ 수정 완료!");
                    cancelEdit();
                    loadAllOrders();
                } else {
                    alert("❌ 수정 실패!");
                }
            });
    }

    function deleteOrder(orderId) {
        if (confirm(`정말 #${orderId}번 주문을 삭제하시겠습니까?`)) {
            fetch(`${API_BASE_URL}/${orderId}`, {
                method: 'DELETE'
            })
                .then(res => {
                    if (res.ok) {
                        alert("🗑️ 삭제되었습니다.");
                        loadAllOrders();
                    } else {
                        alert("❌ 삭제 실패! (서버 로그를 확인하세요)");
                    }
                });
        }
    }
</script>
</body>
</html>
