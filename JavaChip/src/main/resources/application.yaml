spring:
  application:
    name: JavaChip

  jpa:
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true
    hibernate:
      ddl-auto: update
    show-sql: true

  profiles:
    active: dev

  sql:
    init:
      mode: always

  mvc:
    hiddenmethod:
      filter:
        enabled: true