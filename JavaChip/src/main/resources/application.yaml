spring:
  application:
    name: JavaChip

  datasource:
    url: jdbc:mysql://localhost:3306/javachip?serverTimezone=Asia/Seoul
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: never

  mvc:
    hiddenmethod:
      filter:
        enabled: true